<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ with .Params.seo_title }}{{ . }} — Onize Muhammed{{ else }}{{ .Title }} — Onize Muhammed{{ end }}{{ end }}</title>
<meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ site.Params.description }}{{ end }}"/>
<meta name="author" content="{{ site.Params.author }}"/>

<!-- Open Graph -->
<meta property="og:title" content="{{ if .IsHome }}{{ site.Title }}{{ else }}{{ with .Params.seo_title }}{{ . }} — Onize Muhammed{{ else }}{{ .Title }} — Onize Muhammed{{ end }}{{ end }}"/>
<meta property="og:description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ site.Params.description }}{{ end }}"/>
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}"/>
<meta property="og:url" content="{{ .Permalink }}"/>
{{ with .Params.image }}<meta property="og:image" content="{{ . | absURL }}"/>{{ end }}

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:title" content="{{ if .IsHome }}{{ site.Title }}{{ else }}{{ with .Params.seo_title }}{{ . }} — Onize Muhammed{{ else }}{{ .Title }} — Onize Muhammed{{ end }}{{ end }}"/>
<meta name="twitter:description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ site.Params.description }}{{ end }}"/>

<!-- Canonical URL -->
<link rel="canonical" href="{{ .Permalink }}"/>

<!-- Favicon -->
<link rel="icon" type="image/x-icon" href="/favicon.ico"/>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<!-- CSS via Hugo Pipes (minified + fingerprinted) -->
{{ $css := resources.Get "css/main.css" | minify | fingerprint }}
<link rel="stylesheet" href="{{ $css.RelPermalink }}" integrity="{{ $css.Data.Integrity }}" crossorigin="anonymous"/>
