{{ define "main" }}
<div class="page-hero">
  <h1>{{ .Title }}</h1>
</div>
<div class="blog-section">
  <div class="posts-grid">
    {{ range .Pages }}
      <a href="{{ .Permalink }}" class="post-card">
        <div class="post-meta">
          <span class="post-date">{{ .Date.Format "2 January 2006" }}</span>
        </div>
        <h2>{{ .Title }}</h2>
        <p class="post-excerpt">{{ with .Params.description }}{{ . }}{{ else }}{{ .Summary }}{{ end }}</p>
        <span class="read-more">Read more →</span>
      </a>
    {{ end }}
  </div>
</div>
{{ end }}
