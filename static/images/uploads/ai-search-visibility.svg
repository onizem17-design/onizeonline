<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 440" fill="none">
  <rect width="520" height="440" rx="16" fill="#F7F0E3"/>
  
  <!-- Search bar -->
  <rect x="32" y="28" width="456" height="48" rx="8" fill="#FFFFFF" stroke="#D4C8AE" stroke-width="1.5"/>
  <circle cx="60" cy="52" r="10" stroke="#8B6347" stroke-width="2" fill="none"/>
  <line x1="67" y1="59" x2="73" y2="65" stroke="#8B6347" stroke-width="2" stroke-linecap="round"/>
  <text x="88" y="57" font-family="Inter, sans-serif" font-size="14" fill="#7A7A6A">How to reduce SaaS churn...</text>
  
  <!-- Results header -->
  <text x="40" y="112" font-family="DM Serif Display, serif" font-size="18" font-weight="400" fill="#1E2318">AI Search Results</text>
  <rect x="350" y="94" width="130" height="28" rx="14" fill="#EFE3CA"/>
  <text x="380" y="113" font-family="Inter, sans-serif" font-size="11" fill="#8B6347">Last 30 Days ▾</text>
  
  <!-- Divider -->
  <line x1="32" y1="130" x2="488" y2="130" stroke="#D4C8AE" stroke-width="0.5"/>
  
  <!-- Your Website row -->
  <text x="40" y="164" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#1E2318">Your Website</text>
  <text x="162" y="164" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#3B7A2F">+ 48% ↑</text>
  <rect x="40" y="176" width="300" height="10" rx="5" fill="#3B4A2F"/>
  <rect x="340" y="176" width="100" height="10" rx="5" fill="#D4C8AE"/>
  
  <!-- Cited badge -->
  <rect x="40" y="196" width="120" height="22" rx="11" fill="#3B4A2F"/>
  <text x="60" y="211" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#EFE3CA">✦ Cited by AI</text>
  
  <!-- Divider -->
  <line x1="40" y1="232" x2="488" y2="232" stroke="#EFE3CA" stroke-width="1"/>
  
  <!-- Competitor 1 -->
  <text x="40" y="262" font-family="Inter, sans-serif" font-size="14" fill="#7A7A6A">Competitor A</text>
  <rect x="40" y="274" width="220" height="8" rx="4" fill="#B5B0A3"/>
  <rect x="260" y="274" width="80" height="8" rx="4" fill="#E8E2D4"/>
  
  <!-- Divider -->
  <line x1="40" y1="300" x2="488" y2="300" stroke="#EFE3CA" stroke-width="1"/>
  
  <!-- Competitor 2 -->
  <text x="40" y="330" font-family="Inter, sans-serif" font-size="14" fill="#7A7A6A">Competitor B</text>
  <rect x="40" y="342" width="260" height="8" rx="4" fill="#B5B0A3"/>
  <rect x="300" y="342" width="40" height="8" rx="4" fill="#E8E2D4"/>
  
  <!-- Divider -->
  <line x1="40" y1="368" x2="488" y2="368" stroke="#EFE3CA" stroke-width="1"/>
  
  <!-- Competitor 3 -->
  <text x="40" y="398" font-family="Inter, sans-serif" font-size="14" fill="#7A7A6A">Competitor C</text>
  <rect x="40" y="410" width="100" height="8" rx="4" fill="#B5B0A3"/>
</svg>
