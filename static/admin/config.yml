backend:
  name: github
  repo: onizem17-design/onizeonline
  branch: main
  base_url: https://cms-auth.onizem17.workers.dev

media_folder: static/images/uploads
public_folder: /images/uploads

collections:
  - name: blog
    label: Blog Posts
    folder: content/blog
    create: true
    slug: "{{slug}}"
    fields:
      - label: Title (H1 — shown on page)
        name: title
        widget: string
      - label: SEO Title (meta title — shown in Google)
        name: seo_title
        widget: string
        required: false
        hint: "Leave blank to use the H1 title. Keep under 60 characters for best results."
      - label: Date
        name: date
        widget: datetime
      - label: Description
        name: description
        widget: text
        hint: "Shown in Google search results and on the blog listing page. Keep under 160 characters."
      - label: Featured Image
        name: image
        widget: image
        required: false
      - label: Tags
        name: tags
        widget: list
        required: false
      - label: Body
        name: body
        widget: markdown
  - name: pages
    label: Pages
    files:
      - name: homepage
        label: Homepage
        file: content/_index.md
        fields:
          - label: Hero Eyebrow Text
            name: hero_eyebrow
            widget: string
          - label: Hero Headline
            name: hero_headline
            widget: string
          - label: Hero Button Text
            name: hero_cta
            widget: string
          - label: Value Section Heading
            name: value_heading
            widget: string
          - label: Value Section Intro
            name: value_intro
            widget: text
          - label: Value Bullet Points
            name: value_bullets
            widget: list
            hint: "Each item is one bullet point"
          - label: Value Section Button Text
            name: value_cta
            widget: string
          - label: Client Brands
            name: brands
            widget: list
            hint: "Brand names shown in the social proof bar"
          - label: Stats
            name: stats
            widget: list
            fields:
              - label: Number (e.g. 150%)
                name: number
                widget: string
                required: false
              - label: Use Badge Instead of Number
                name: badge
                widget: boolean
                default: false
                required: false
              - label: Badge Text
                name: badge_text
                widget: string
                required: false
              - label: Description
                name: description
                widget: string
          - label: AI Section Heading
            name: ai_heading
            widget: string
          - label: AI Section Bullet Points
            name: ai_bullets
            widget: list
          - label: Testimonials
            name: testimonials
            widget: list
            fields:
              - label: Quote
                name: quote
                widget: text
              - label: Client Name
                name: name
                widget: string
              - label: Role & Company
                name: role
                widget: string
              - label: Initial (single letter avatar)
                name: initial
                widget: string
          - label: Services
            name: services
            widget: list
            fields:
              - label: Icon (emoji)
                name: icon
                widget: string
              - label: Service Title
                name: title
                widget: string
              - label: Subtitle
                name: subtitle
                widget: string
              - label: Bullet Points
                name: bullets
                widget: list
              - label: Button Text
                name: cta
                widget: string

  - name: testimonials
    label: Testimonials
    folder: _testimonials
    create: true
    fields:
      - label: Client Name
        name: name
        widget: string
      - label: Title and Company
        name: title
        widget: string
      - label: Quote
        name: quote
        widget: text
      - label: Photo
        name: photo
        widget: image
        required: false
