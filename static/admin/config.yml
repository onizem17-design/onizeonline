backend:
  name: github
  repo: onizem17-design/onizeonline
  branch: main
  base_url: https://cms-auth.onizem17.workers.dev

media_folder: static/images/uploads
public_folder: /images/uploads

collections:
  - name: blog
    label: Blog Posts
    folder: content/blog
    create: true
    slug: "{{slug}}"
    fields:
      - label: Title (H1 — shown on page)
        name: title
        widget: string
      - label: SEO Title (meta title — shown in Google)
        name: seo_title
        widget: string
        required: false
        hint: "Leave blank to use the H1 title. Keep under 60 characters for best results."
      - label: Date
        name: date
        widget: datetime
      - label: Description
        name: description
        widget: text
        hint: "Shown in Google search results and on the blog listing page. Keep under 160 characters."
      - label: Featured Image
        name: image
        widget: image
        required: false
      - label: Tags
        name: tags
        widget: list
        required: false
      - label: Body
        name: body
        widget: markdown
  - name: pages
    label: Pages
    files:
      - name: homepage
        label: Homepage
        file: content/_index.md
        fields:
          - label: Hero Photo
            name: hero_photo
            widget: image
            required: false
            hint: "Your headshot shown in the homepage hero section"
          - label: Hero Eyebrow Text
            name: hero_eyebrow
            widget: string
          - label: Hero Headline
            name: hero_headline
            widget: string
          - label: Hero Button Text
            name: hero_cta
            widget: string
          - label: Value Section Heading
            name: value_heading
            widget: string
          - label: Value Section Intro
            name: value_intro
            widget: text
          - label: Value Bullet Points
            name: value_bullets
            widget: list
            hint: "Each item is one bullet point"
          - label: Value Section Button Text
            name: value_cta
            widget: string
          - label: Client Brands
            name: brands
            widget: list
            hint: "Brand names shown in the social proof bar"
          - label: Stats
            name: stats
            widget: list
            fields:
              - label: Number (e.g. 150%)
                name: number
                widget: string
                required: false
              - label: Use Badge Instead of Number
                name: badge
                widget: boolean
                default: false
                required: false
              - label: Badge Text
                name: badge_text
                widget: string
                required: false
              - label: Description
                name: description
                widget: string
          - label: AI Section Heading
            name: ai_heading
            widget: string
          - label: AI Section Bullet Points
            name: ai_bullets
            widget: list
          - label: Testimonials
            name: testimonials
            widget: list
            fields:
              - label: Quote
                name: quote
                widget: text
              - label: Client Name
                name: name
                widget: string
              - label: Role & Company
                name: role
                widget: string
              - label: Initial (single letter avatar)
                name: initial
                widget: string
          - label: Services
            name: services
            widget: list
            fields:
              - label: Icon (emoji)
                name: icon
                widget: string
              - label: Service Title
                name: title
                widget: string
              - label: Subtitle
                name: subtitle
                widget: string
              - label: Bullet Points
                name: bullets
                widget: list
              - label: Button Text
                name: cta
                widget: string

      - name: about
        label: About Page
        file: content/about.md
        fields:
          - label: SEO Description
            name: description
            widget: text
          - label: Hero Eyebrow
            name: hero_eyebrow
            widget: string
          - label: Hero Headline
            name: hero_headline
            widget: string
          - label: Hero Subtext
            name: hero_sub
            widget: text
          - label: Bio Section Tag
            name: bio_tag
            widget: string
          - label: Bio Heading
            name: bio_heading
            widget: string
          - label: Bio Paragraphs
            name: bio_paragraphs
            widget: list
            hint: "Each item is one paragraph"
          - label: Fun Fact / Highlight
            name: fun_fact
            widget: text
            required: false
          - label: Expertise Section Tag
            name: expertise_tag
            widget: string
          - label: Expertise Heading
            name: expertise_heading
            widget: string
          - label: Expertise Items
            name: expertise_items
            widget: list
            hint: "Each item is one expertise point"
          - label: Values Section Heading
            name: values_heading
            widget: string
          - label: Values
            name: values
            widget: list
            fields:
              - label: Icon (emoji)
                name: icon
                widget: string
              - label: Title
                name: title
                widget: string
              - label: Description
                name: description
                widget: text
          - label: CTA Heading
            name: cta_heading
            widget: string
          - label: CTA Subtext
            name: cta_sub
            widget: text
          - label: CTA Button Text
            name: cta_button
            widget: string

      - name: portfolio
        label: Portfolio Page
        file: content/portfolio.md
        fields:
          - label: SEO Description
            name: description
            widget: text
          - label: Hero Eyebrow
            name: hero_eyebrow
            widget: string
          - label: Hero Headline
            name: hero_headline
            widget: string
          - label: Hero Subtext
            name: hero_sub
            widget: text
          - label: Projects
            name: projects
            widget: list
            fields:
              - label: Client Name
                name: client
                widget: string
              - label: Project Title
                name: title
                widget: string
              - label: Description
                name: description
                widget: text
              - label: Tags
                name: tags
                widget: list
              - label: Results
                name: results
                widget: list
                required: false
                fields:
                  - label: Number (e.g. 150%)
                    name: number
                    widget: string
                  - label: Label
                    name: label
                    widget: string
              - label: Case Study URL
                name: cta_url
                widget: string
                required: false
              - label: Featured Image
                name: image
                widget: image
                required: false
          - label: Client Brands
            name: brands
            widget: list
          - label: CTA Heading
            name: cta_heading
            widget: string
          - label: CTA Subtext
            name: cta_sub
            widget: text
          - label: CTA Button Text
            name: cta_button
            widget: string

      - name: pricing
        label: Pricing Page
        file: content/pricing.md
        fields:
          - label: SEO Description
            name: description
            widget: text
          - label: Hero Eyebrow
            name: hero_eyebrow
            widget: string
          - label: Hero Headline
            name: hero_headline
            widget: string
          - label: Hero Subtext
            name: hero_sub
            widget: text
          - label: Packages
            name: packages
            widget: list
            fields:
              - label: Icon (emoji)
                name: icon
                widget: string
              - label: Package Name
                name: name
                widget: string
              - label: Subtitle
                name: subtitle
                widget: string
              - label: Price
                name: price
                widget: string
              - label: Price Note
                name: price_note
                widget: string
              - label: Mark as Featured / Most Popular
                name: featured
                widget: boolean
                default: false
                required: false
              - label: Features (bullet points)
                name: features
                widget: list
              - label: Button Text
                name: cta
                widget: string
          - label: Packages Note (shown below grid)
            name: packages_note
            widget: string
          - label: FAQ Section Heading
            name: faq_heading
            widget: string
          - label: FAQs
            name: faqs
            widget: list
            fields:
              - label: Question
                name: question
                widget: string
              - label: Answer
                name: answer
                widget: text
          - label: CTA Heading
            name: cta_heading
            widget: string
          - label: CTA Subtext
            name: cta_sub
            widget: text
          - label: CTA Button Text
            name: cta_button
            widget: string

      - name: contact
        label: Contact Page
        file: content/contact.md
        fields:
          - label: SEO Description
            name: description
            widget: text
          - label: Hero Eyebrow
            name: hero_eyebrow
            widget: string
          - label: Hero Headline
            name: hero_headline
            widget: string
          - label: Hero Subtext
            name: hero_sub
            widget: text
          - label: Info Section Heading
            name: info_heading
            widget: string
          - label: Info Text
            name: info_text
            widget: text
          - label: Email Address
            name: email
            widget: string
          - label: Booking Link URL
            name: booking_url
            widget: string
            required: false
          - label: Booking Link Label
            name: booking_label
            widget: string
            required: false
          - label: Booking Note
            name: booking_note
            widget: string
            required: false
          - label: LinkedIn URL
            name: linkedin_url
            widget: string
            required: false
          - label: Form Heading
            name: form_heading
            widget: string
          - label: Form Subtext
            name: form_sub
            widget: string
          - label: Form Button Text
            name: form_button
            widget: string
          - label: Service Options (dropdown)
            name: service_options
            widget: list
          - label: "What Happens Next — Heading"
            name: expect_heading
            widget: string
          - label: "What Happens Next — Steps"
            name: expect_steps
            widget: list
            fields:
              - label: Step Title
                name: title
                widget: string
              - label: Step Description
                name: description
                widget: text

      - name: project
        label: Featured Case Study
        file: content/project.md
        fields:
          - label: SEO Description
            name: description
            widget: text
          - label: Hero Eyebrow
            name: hero_eyebrow
            widget: string
          - label: Hero Headline
            name: hero_headline
            widget: string
          - label: Hero Subtext
            name: hero_sub
            widget: text
          - label: Client Name
            name: client
            widget: string
          - label: Service Provided
            name: service
            widget: string
          - label: Industry
            name: industry
            widget: string
            required: false
          - label: Timeline
            name: timeline
            widget: string
            required: false
          - label: Results (top stats)
            name: results
            widget: list
            fields:
              - label: Number (e.g. 150%)
                name: number
                widget: string
              - label: Label
                name: label
                widget: string
          - label: Challenge Section Heading
            name: challenge_heading
            widget: string
          - label: Challenge Text
            name: challenge_text
            widget: text
          - label: Approach Section Heading
            name: approach_heading
            widget: string
          - label: Approach Text
            name: approach_text
            widget: text
          - label: Approach Bullet Points
            name: approach_bullets
            widget: list
            required: false
          - label: Results Section Heading
            name: outcome_heading
            widget: string
          - label: Results Text
            name: outcome_text
            widget: text
          - label: Client Testimonial Quote
            name: testimonial_quote
            widget: text
            required: false
          - label: Testimonial — Client Name
            name: testimonial_name
            widget: string
            required: false
          - label: Testimonial — Role & Company
            name: testimonial_role
            widget: string
            required: false
          - label: CTA Heading
            name: cta_heading
            widget: string
          - label: CTA Subtext
            name: cta_sub
            widget: text
          - label: CTA Button Text
            name: cta_button
            widget: string

  - name: testimonials
    label: Testimonials
    folder: _testimonials
    create: true
    fields:
      - label: Client Name
        name: name
        widget: string
      - label: Title and Company
        name: title
        widget: string
      - label: Quote
        name: quote
        widget: text
      - label: Photo
        name: photo
        widget: image
        required: false
