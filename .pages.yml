content:
  - name: blog
    label: Blog Posts
    path: _posts
    type: collection
    view:
      fields: [title, date]
    fields:
      - name: title
        label: Title
        type: string
      - name: date
        label: Date
        type: date
      - name: image
        label: Featured Image
        type: image
        required: false
      - name: excerpt
        label: Excerpt
        type: text
      - name: body
        label: Content
        type: rich-text

  - name: testimonials
    label: Testimonials
    path: _testimonials
    type: collection
    fields:
      - name: name
        label: Client Name
        type: string
      - name: title
        label: Title & Company
        type: string
      - name: quote
        label: Quote
        type: text
      - name: photo
        label: Photo
        type: image
        required: false

  - name: services
    label: Services
    path: _services
    type: collection
    fields:
      - name: title
        label: Service Title
        type: string
      - name: subtitle
        label: Subtitle
        type: string
      - name: description
        label: Description
        type: text
      - name: cta
        label: CTA Text
        type: string

  - name: portfolio
    label: Portfolio
    path: _portfolio
    type: collection
    fields:
      - name: client
        label: Client Name
        type: string
      - name: type
        label: Project Type
        type: string
      - name: description
        label: Description
        type: text
      - name: results
        label: Results
        type: text
      - name: image
        label: Featured Image
        type: image
        required: false